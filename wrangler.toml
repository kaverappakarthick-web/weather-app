name = "weather-app"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"

# KV namespace for AI response caching (briefing TTL 30min, plan TTL 60min)
# Setup: run `npx wrangler kv namespace create AI_CACHE`
#        then replace the id/preview_id values below with the output
[[kv_namespaces]]
binding    = "AI_CACHE"
id         = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_NAMESPACE_PREVIEW_ID"
